# Sector shard — defines which agent owns which symbols.
#
# Rules:
# - Each symbol is owned by exactly one agent. No overlaps.
# - 30 symbols per active sector agent.
# - bearish_via:
#     - 'inverse_etf:XXX' = a verified inverse ETF; allocator can resolve any
#       legacy short-direction submission to this vehicle.
#     - 'skip' = no direct short or vetted inverse from this map. Agents
#       express bearish views by going long an inverse vehicle from
#       agents/inverse_etf_map.yaml (which the allocator nets at portfolio
#       level via meta_agent.allocator.net_inverse_pairs).

