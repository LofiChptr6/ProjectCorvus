# ════════════════════════════════════════════════════════════════════════════
# LEVERAGED ETF DIRECTIONAL VEHICLE CATALOG — DRAFT
# ════════════════════════════════════════════════════════════════════════════
#
# Bidirectional expansion of agents/inverse_etf_map.yaml.
#
# Purpose: when a sector agent expresses a directional view on an underlying,
# the desk routes to the highest-leverage, US-listed, currently trading,
# daily-reset ETF that expresses that direction.
#
# Convention (per feedback_inverse_etf_routing 2026-04-27):
#   - Always submit direction="long" on the chosen vehicle.
#   - Sizing accounts for the leverage factor (e.g., 3x bull → 1/3 the
#     dollar notional vs. trading the underlying directly).
#   - Bear vehicle is held LONG, never shorted.
#
# Schema per entry:
#   ticker         : the leveraged ETF
#   leverage       : signed daily-reset multiplier (+3.0 = 3x bull, -2.0 = 2x bear)
#   description    : vendor + product name
#   vendor         : Direxion | ProShares | GraniteShares | T-REX (REX Shares) |
#                    Tradr | Defiance | Leverage Shares | Invesco
#   verified_url   : vendor product page
#
# Audit rules:
#   - US-listed only (UK 5x products excluded — desk trades IBKR US only)
#   - Cap leverage at 3x (no exotic 4x/5x even if available)
#   - Daily-reset products only (no monthly-reset/capped buffer ETFs)
#   - Listed in priority of leverage magnitude (highest first)
#
# ════════════════════════════════════════════════════════════════════════════

