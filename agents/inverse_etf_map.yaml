# Inverse ETF lookup table — single source of truth for the desk.
#
# Used by:
#   - agent/prompt_builder.py — filters verified=true entries, formats as a
#     catalog, injects into every sector agent's system prompt so agents pick
#     vehicles from a vetted list.
#   - meta_agent/allocator.py:net_inverse_pairs — collapses (long underlying +
#     long its inverse) positions into a single net position before order
#     generation, avoiding paying both legs of an offsetting trade.
#
# Each entry:
#   underlying : the ETF/index/stock the inverse moves opposite to
#   leverage   : signed daily-reset leverage factor (e.g., -2.0 for a 2x bear)
#   description: vendor + product name
#   verified   : true = manually audited via vendor websites + at least one
#                external quote source (Yahoo / Morningstar / Bloomberg)
#
# AUDIT POLICY: only entries with verified=true are exposed to agent prompts.

version: 2
